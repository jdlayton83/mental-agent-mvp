services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: mental-agent-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: mental_agent
      POSTGRES_USER: app_user
      POSTGRES_PASSWORD: app_password
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U app_user -d mental_agent"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  postgres_data:
